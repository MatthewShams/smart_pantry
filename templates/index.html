<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Pantry</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge.scanning { background: #1a4a8a; color: #93c5fd; animation: pulse 1.2s infinite; }
  .badge.idle     { background: #1a3a2a; color: #6ee7b7; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .main { display: grid; grid-template-columns: 1fr 340px; gap: 0; height: calc(100vh - 57px); overflow: hidden; }
  .left  { overflow-y: auto; padding: 20px; }
  .right { background: #1a1d2e; border-left: 1px solid #2d3748; overflow-y: auto; padding: 20px; }

  .section { margin-bottom: 24px; }
  .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 10px; }

  /* Shelf grid */
  .shelf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 20px; }
  .slot { background: #1e2230; border: 1px solid #2d3748; border-radius: 8px; padding: 8px; cursor: pointer; transition: border-color .15s; min-height: 64px; }
  .slot:hover { border-color: #4a5568; }
  .slot.fresh    { border-color: #065f46; background: #0a2a1f; }
  .slot.expiring { border-color: #92400e; background: #2a1800; }
  .slot.expired  { border-color: #991b1b; background: #2a0a0a; }
  .slot.recipe   { border-color: #b45309; background: #2a1e00; animation: glow 1s ease-in-out infinite alternate; }
  .slot.empty    { border-style: dashed; opacity: 0.4; }
  @keyframes glow { from { box-shadow: 0 0 4px #b45309; } to { box-shadow: 0 0 12px #f59e0b; } }
  .slot-num  { font-size: 9px; color: #475569; margin-bottom: 3px; }
  .slot-name { font-size: 12px; font-weight: 500; color: #e2e8f0; line-height: 1.3; }
  .slot-sub  { font-size: 10px; color: #64748b; margin-top: 2px; }
  .slot-dot  { width: 8px; height: 8px; border-radius: 50%; float: right; margin-top: 2px; }
  .dot-fresh    { background: #10b981; }
  .dot-expiring { background: #f59e0b; }
  .dot-expired  { background: #ef4444; }

  /* Ingredient list */
  .ing-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; background: #1e2230; margin-bottom: 4px; }
  .ing-name { flex: 1; font-size: 13px; }
  .ing-meta { font-size: 11px; color: #64748b; }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; }
  .tag.fresh    { background: #064e3b; color: #6ee7b7; }
  .tag.expiring { background: #451a03; color: #fcd34d; }
  .tag.expired  { background: #450a0a; color: #fca5a5; }
  .del-btn { background: none; border: none; color: #475569; cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 14px; }
  .del-btn:hover { color: #ef4444; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
  .btn-green   { background: #059669; color: #fff; }
  .btn-green:hover:not(:disabled) { background: #047857; }
  .btn-amber   { background: #d97706; color: #fff; }
  .btn-amber:hover:not(:disabled) { background: #b45309; }
  .btn-ghost   { background: #1e2230; color: #94a3b8; border: 1px solid #2d3748; }
  .btn-ghost:hover { background: #252a3e; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

  /* Recipe cards */
  .recipe-card { background: #1e2230; border: 1px solid #2d3748; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .recipe-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .recipe-meta { font-size: 11px; color: #64748b; margin-bottom: 8px; }
  .recipe-pct  { height: 4px; border-radius: 2px; background: #2d3748; margin-bottom: 8px; }
  .recipe-pct-fill { height: 100%; border-radius: 2px; background: #10b981; }
  .recipe-tags span { font-size: 10px; background: #1a2540; color: #93c5fd; padding: 2px 6px; border-radius: 4px; margin-right: 4px; }

  /* Status numbers */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat { background: #1e2230; border-radius: 8px; padding: 10px 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-lab { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
  .num-total  { color: #93c5fd; }
  .num-warn   { color: #fcd34d; }
  .num-bad    { color: #f87171; }

  /* Grocery list */
  .grocery-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #1e2230; font-size: 13px; }
  .grocery-item:last-child { border-bottom: none; }
  .priority-high   { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
  .priority-medium { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }

  /* Scan preview */
  #scan-preview { width: 100%; border-radius: 8px; display: block; margin-bottom: 12px; }

  input, select { background: #1e2230; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 100%; }
  input:focus, select:focus { outline: none; border-color: #4a5568; }
  label { font-size: 12px; color: #64748b; display: block; margin-bottom: 3px; margin-top: 8px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
</style>
</head>
<body>

<header>
  <span style="font-size:22px;">🥫</span>
  <h1>Smart Pantry</h1>
  <span id="scan-badge" class="badge idle">● Idle</span>
  <div style="flex:1"></div>
  <button class="btn btn-primary" onclick="triggerScan()" id="scan-btn">📷 Scan now</button>
</header>

<div class="main">
  <!-- LEFT: shelf + ingredients + recipes -->
  <div class="left">

    <!-- Stats -->
    <div class="stat-row" id="stats">
      <div class="stat"><div class="stat-num num-total" id="stat-total">—</div><div class="stat-lab">Items</div></div>
      <div class="stat"><div class="stat-num num-warn"  id="stat-expiring">—</div><div class="stat-lab">Expiring</div></div>
      <div class="stat"><div class="stat-num num-bad"   id="stat-expired">—</div><div class="stat-lab">Expired</div></div>
    </div>

    <!-- Shelf visualiser -->
    <div class="section">
      <div class="section-title">Shelf map</div>
      <div class="shelf-grid" id="shelf-grid"></div>
    </div>

    <!-- Last scan preview -->
    <img id="scan-preview" src="/static/latest_scan.jpg" alt="Last scan">

    <!-- Ingredient table -->
    <div class="section">
      <div class="section-title">All ingredients</div>
      <div id="ing-list"></div>
    </div>

    <!-- Recipe suggestions -->
    <div class="section">
      <div class="section-title">Recipe suggestions</div>
      <div class="btn-row">
        <button class="btn btn-green" onclick="loadRecipes()">✨ Suggest recipes</button>
        <button class="btn btn-ghost"  onclick="clearHighlight()">Clear LEDs</button>
        <select id="diet-pref" style="width:auto;flex:1">
          <option value="">Any diet</option>
          <option value="vegetarian">Vegetarian</option>
          <option value="vegan">Vegan</option>
          <option value="gluten-free">Gluten-free</option>
          <option value="quick (under 20 min)">Quick (&lt;20 min)</option>
        </select>
      </div>
      <div id="recipes-loading" style="display:none;color:#64748b;font-size:13px;">Asking Gemini…</div>
      <div id="recipe-list"></div>
    </div>
  </div>

  <!-- RIGHT: add ingredient + grocery list -->
  <div class="right">
    <div class="section">
      <div class="section-title">Add ingredient manually</div>
      <label>Name *</label>
      <input id="f-name" placeholder="e.g. olive oil">
      <label>Category</label>
      <select id="f-cat">
        <option value="">—</option>
        <option>produce</option><option>dairy</option><option>grains</option>
        <option>protein</option><option>condiment</option><option>beverage</option>
        <option>snack</option><option>spice</option><option>other</option>
      </select>
      <div class="form-row">
        <div><label>Quantity</label><input id="f-qty" type="number" placeholder="e.g. 500"></div>
        <div><label>Unit</label><input id="f-unit" placeholder="g / ml / pieces"></div>
      </div>
      <div class="form-row">
        <div><label>Shelf slot (0–11)</label><input id="f-slot" type="number" min="0" max="11"></div>
        <div><label>Expiry date</label><input id="f-exp" type="date"></div>
      </div>
      <label>Notes</label>
      <input id="f-notes" placeholder="opened, half-full…">
      <button class="btn btn-amber" style="margin-top:10px;width:100%;" onclick="addIngredient()">+ Add</button>
    </div>

    <div class="section">
      <div class="section-title">Grocery list</div>
      <div id="grocery-list"><span style="color:#475569;font-size:13px;">Loading…</span></div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let ingredients = [];
let currentRecipes = [];
let highlightedRecipe = null;

// ── Polling ────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const [status, ings, grocery] = await Promise.all([
      fetch('/api/status').then(r => r.json()),
      fetch('/api/ingredients').then(r => r.json()),
      fetch('/api/grocery-list').then(r => r.json()),
    ]);
    ingredients = ings;
    updateStatus(status);
    renderShelf(ings, status.led_state);
    renderIngredients(ings);
    renderGrocery(grocery.grocery_list);
  } catch(e) { console.warn('poll error', e); }
}

function updateStatus(s) {
  document.getElementById('stat-total').textContent    = s.ingredient_count;
  document.getElementById('stat-expiring').textContent = s.expiring_soon;
  document.getElementById('stat-expired').textContent  = s.expired;
  const badge = document.getElementById('scan-badge');
  const btn   = document.getElementById('scan-btn');
  if (s.scanning) {
    badge.textContent = '● Scanning…'; badge.className = 'badge scanning';
    btn.disabled = true;
  } else {
    badge.textContent = '● Idle'; badge.className = 'badge idle';
    btn.disabled = false;
  }
}

// ── Shelf grid ─────────────────────────────────────────────────────────────
function expiryClass(expiry) {
  if (!expiry) return 'fresh';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(expiry);
  if (d < today) return 'expired';
  const diff = (d - today) / 86400000;
  return diff <= 7 ? 'expiring' : 'fresh';
}

function renderShelf(ings, ledState) {
  const bySlot = {};
  ings.forEach(i => { if (i.shelf_slot != null) bySlot[i.shelf_slot] = i; });

  const highlightSlots = new Set(
    highlightedRecipe
      ? (highlightedRecipe.uses_ingredients || []).map(n => {
          const item = ings.find(i => i.name.toLowerCase() === n.toLowerCase());
          return item?.shelf_slot;
        }).filter(s => s != null)
      : []
  );

  const grid = document.getElementById('shelf-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const item = bySlot[i];
    const div  = document.createElement('div');
    const ec   = item ? expiryClass(item.expiry_date) : 'empty';
    const isRecipe = highlightSlots.has(i);
    div.className = `slot ${isRecipe ? 'recipe' : ec}`;

    if (item) {
      const dotClass = `dot-${ec}`;
      div.innerHTML = `
        <div class="slot-num">#${i} <span class="slot-dot ${dotClass}"></span></div>
        <div class="slot-name">${item.name}</div>
        <div class="slot-sub">${item.quantity != null ? item.quantity + (item.unit||'') : ''} ${item.expiry_date ? '· '+item.expiry_date : ''}</div>`;
      div.onclick = () => blinkSlot(i);
    } else {
      div.innerHTML = `<div class="slot-num">#${i}</div><div class="slot-sub">empty</div>`;
    }
    grid.appendChild(div);
  }
}

// ── Ingredients list ───────────────────────────────────────────────────────
function renderIngredients(ings) {
  const el = document.getElementById('ing-list');
  if (!ings.length) { el.innerHTML = '<span style="color:#475569;font-size:13px;">No ingredients yet — scan your pantry!</span>'; return; }
  el.innerHTML = ings.map(i => {
    const ec   = expiryClass(i.expiry_date);
    const label = ec === 'fresh' ? 'fresh' : ec === 'expiring' ? 'expiring' : 'expired';
    return `<div class="ing-row">
      <div class="ing-name">${i.name}</div>
      <div class="ing-meta">${i.quantity != null ? i.quantity+(i.unit||'') : ''} ${i.category||''}</div>
      <span class="tag ${ec}">${label}</span>
      <button class="del-btn" onclick="deleteIng(${i.id})" title="Remove">✕</button>
    </div>`;
  }).join('');
}

// ── Recipes ────────────────────────────────────────────────────────────────
async function loadRecipes() {
  const pref = document.getElementById('diet-pref').value;
  document.getElementById('recipes-loading').style.display = 'block';
  document.getElementById('recipe-list').innerHTML = '';
  try {
    const r = await fetch(`/api/recipes/suggest?dietary=${encodeURIComponent(pref)}&count=3`).then(r => r.json());
    currentRecipes = r.recipes || [];
    renderRecipes(currentRecipes);
  } catch(e) { document.getElementById('recipe-list').innerHTML = '<span style="color:#ef4444;font-size:13px;">Error loading recipes</span>'; }
  document.getElementById('recipes-loading').style.display = 'none';
}

function renderRecipes(recipes) {
  const el = document.getElementById('recipe-list');
  if (!recipes.length) { el.innerHTML = '<span style="color:#475569;font-size:13px;">No recipes found — try scanning first</span>'; return; }
  el.innerHTML = recipes.map((r, idx) => {
    const total = (r.uses_ingredients||[]).length + (r.missing_ingredients||[]).length;
    const have  = (r.uses_ingredients||[]).length;
    const pct   = total ? Math.round(have/total*100) : 0;
    return `<div class="recipe-card">
      <div class="recipe-name">${r.name}</div>
      <div class="recipe-meta">⏱ ${r.prep_time_minutes} min · ${r.difficulty} · ${pct}% ingredients on hand</div>
      <div class="recipe-pct"><div class="recipe-pct-fill" style="width:${pct}%"></div></div>
      <div class="recipe-tags">${(r.tags||[]).map(t=>`<span>${t}</span>`).join('')}</div>
      <div style="margin-top:8px;font-size:11px;color:#475569;">
        ✅ ${(r.uses_ingredients||[]).join(', ')||'—'}<br>
        ${r.missing_ingredients?.length ? '🛒 Need: '+r.missing_ingredients.join(', ') : ''}
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;">
        <button class="btn btn-amber" style="font-size:12px;padding:6px 10px;" onclick="highlightRecipe(${idx})">💡 Highlight in pantry</button>
        <button class="btn btn-ghost"  style="font-size:12px;padding:6px 10px;" onclick="toggleInstructions(${idx})">📋 Instructions</button>
      </div>
      <div id="instr-${idx}" style="display:none;margin-top:8px;font-size:12px;color:#94a3b8;white-space:pre-line;">${r.instructions}</div>
    </div>`;
  }).join('');
}

function toggleInstructions(idx) {
  const el = document.getElementById(`instr-${idx}`);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function highlightRecipe(idx) {
  const recipe = currentRecipes[idx];
  if (!recipe) return;
  highlightedRecipe = recipe;
  await fetch('/api/recipes/highlight', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(recipe) });
  renderShelf(ingredients, []);
}

async function clearHighlight() {
  highlightedRecipe = null;
  await fetch('/api/recipes/clear', { method: 'POST' });
  poll();
}

// ── Grocery ────────────────────────────────────────────────────────────────
function renderGrocery(list) {
  const el = document.getElementById('grocery-list');
  if (!list.length) { el.innerHTML = '<span style="color:#475569;font-size:13px;">Nothing needed — pantry looks good!</span>'; return; }
  el.innerHTML = list.map(i =>
    `<div class="grocery-item">
      <div class="priority-${i.priority}"></div>
      <span>${i.name}</span>
      <span style="color:#475569;font-size:11px;margin-left:auto;">${i.reason}</span>
    </div>`
  ).join('');
}

// ── Actions ────────────────────────────────────────────────────────────────
async function triggerScan() { console.log("Scan Clicked"); document.getElementById("scan-badge").textContent = "● Initializing...";
  document.getElementById('scan-btn').disabled = true;
  const r = await fetch('/api/scan', { method: 'POST' }).then(r => r.json());
  if (r.success) {
    document.getElementById('scan-preview').src = '/static/latest_scan.jpg?t=' + Date.now();
    document.getElementById('scan-preview').style.display = 'block';
  }
  poll();
}

async function deleteIng(id) {
  await fetch(`/api/ingredients/${id}`, { method: 'DELETE' });
  poll();
}

async function addIngredient() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return alert('Name is required');
  await fetch('/api/ingredients', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      category:    document.getElementById('f-cat').value   || null,
      quantity:    parseFloat(document.getElementById('f-qty').value) || null,
      unit:        document.getElementById('f-unit').value  || null,
      shelf_slot:  parseInt(document.getElementById('f-slot').value) || null,
      expiry_date: document.getElementById('f-exp').value   || null,
      notes:       document.getElementById('f-notes').value || null,
    })
  });
  ['f-name','f-qty','f-unit','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-slot').value = '';
  document.getElementById('f-exp').value  = '';
  poll();
}

async function blinkSlot(slot) {
  await fetch('/api/leds/blink', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({slot}) });
}

// ── Boot ───────────────────────────────────────────────────────────────────
poll();
setInterval(poll, 4000);
</script>
</body>
</html>
